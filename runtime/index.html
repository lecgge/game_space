<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent page zoom to avoid UI scaling issues -->
    <meta name="applicable-device" content="non-mobile">
    <title>Game Space - Electron App</title>

    <!-- Prevent text size adjustment that triggers 10px increase on user gesture -->
    <style>
      * {
        touch-action: manipulation;
      }
      body {
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>

    <!-- Inject Electron API -->
    <script src="./api.js"></script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React App Mount -->
    <script type="module">
      import { Root } from '../runtime/main.jsx';
      
      const rootElement = document.getElementById('root');
      const electronApi = window.electronAPI;
      
      // Store API reference for renderer to access later
      window.electronAPI = electronApi;
      
      // Create root with injected Electron APIs
      const root = Root.renderToRoot({ api: electronApi });
      
      // Listen for devtools toggle events
      electronApi.onOpenDevTools?.();
    </script>
  </body>
</html>
